name: Quality Pipeline

on:
  push:
    branches-ignore:
      - "renovate/**"
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Typecheck, unit, and Playwright tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install app dependencies
        run: yarn install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Typecheck app
        run: yarn types

      - name: Run unit tests
        run: yarn test:unit:ci

      - name: Build app
        run: yarn build

      - name: Setup Playwright package cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: playwright/package-lock.json

      - name: Install Playwright dependencies
        working-directory: playwright
        run: npm ci

      - name: Install Playwright browsers
        working-directory: playwright
        run: npx playwright install --with-deps chromium

      - name: Typecheck Playwright tests
        working-directory: playwright
        run: npx tsc -p tsconfig.json --noEmit

      - name: Run Playwright API tests
        working-directory: playwright
        run: npm run test:api -- --workers=1
        env:
          RELIABILITY_REPORT_NAME: api-reliability-summary

      - name: Run Playwright UI tests
        working-directory: playwright
        run: npm run test:ui -- --workers=1
        env:
          RELIABILITY_REPORT_NAME: ui-reliability-summary

      - name: Print reliability telemetry summaries
        if: always()
        working-directory: playwright
        run: |
          if compgen -G "reports/*-reliability-summary.md" > /dev/null; then
            for report in reports/*-reliability-summary.md; do
              echo "===== ${report} ====="
              cat "${report}"
            done
          else
            echo "No reliability summaries were generated."
          fi

      - name: Upload Playwright reliability reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reliability-reports
          path: playwright/reports
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: playwright/test-results
          if-no-files-found: ignore
          retention-days: 14
